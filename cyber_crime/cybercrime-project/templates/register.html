<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cybercrime System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <header class="header">
        <h1>Cybercrime Complaint System</h1>
    </header>

    <div class="card">
        <h2>Create New Account</h2>
        {% if register_message %}
            <div class="message">{{ register_message }}</div>
        {% elif message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        <form method="POST" id="register-form" class="auth-form">
            <div class="form-group">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" name="username" placeholder="Choose a username" value="{{ username|default('') }}" required>
            </div>
            <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" name="email" placeholder="Enter your email" value="{{ email|default('') }}" required>
            </div>
            <div class="form-group">
                <label for="register-phone">Phone Number</label>
                <input type="tel" id="register-phone" name="phone" placeholder="Enter your phone number" value="{{ phone|default('') }}" required>
            </div>
            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="register-role">Account Type</label>
                <select id="register-role" name="role" required>
                    <option value="user" {% if role == 'user' %}selected{% endif %}>User</option>
                    <option value="admin" {% if role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label for="register-otp">OTP</label>
                <input type="text" id="register-otp" name="otp" placeholder="Enter OTP sent to your email" required>
            </div>

            <div class="button-group">
                <button type="button" id="send-otp-button" class="otp-btn">Send OTP</button>
                <button type="submit" class="auth-btn">Register</button>
            </div>
        </form>

        <div id="otp-message"></div>
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

    <script>
        document.getElementById('send-otp-button').addEventListener('click', async function () {
            const email = document.getElementById('register-email').value;
            if (!email) {
                alert('Please enter your email before requesting OTP.');
                return;
            }

            const formData = new FormData();
            formData.append('email', email);

            try {
                const response = await fetch('/send_register_otp', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();
                const otpContainer = document.getElementById('otp-message');
                let html = `<div class="message">${data.message}</div>`;
                if (data.otp) {
                    html += `<div class="message">Your OTP: ${data.otp}</div>`;
                }
                otpContainer.innerHTML = html;
            } catch (error) {
                document.getElementById('otp-message').innerHTML = '<div class="message error">Failed to send OTP. Please try again.</div>';
            }
        });
    </script>

</div>

</body>
</html>
